<!DOCTYPE html>
<html>
<head>
<title>Smart Job Portal</title>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(120deg,#0f172a,#2563eb,#7c3aed);
color:white;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar h4{
font-weight:bold;
}

.navbar button{
margin-left:10px;
border:none;
padding:8px 14px;
border-radius:8px;
background:#38bdf8;
color:white;
transition:0.3s;
}

.navbar button:hover{
background:#0ea5e9;
}

/* SEARCH BOX */
.container-box{
background:white;
color:black;
padding:25px;
border-radius:15px;
margin:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 1s;
}

input{
padding:10px;
width:60%;
border-radius:8px;
border:1px solid #ccc;
margin-right:10px;
}

/* JOB CARD */
.card{
border-radius:15px;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
padding:20px;
margin:10px;
background:white;
color:black;
animation:fadeUp 0.6s;
}

.card:hover{
transform:translateY(-10px);
}

/* BUTTON */
.apply-btn{
background:#22c55e;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
margin-top:10px;
}

.apply-btn:hover{
background:#16a34a;
}

/* POPUP */
#jobForm{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:12px;
z-index:1000;
color:black;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h4>Smart Job Portal</h4>

<div>
<button id="addJobBtn" onclick="openAddJob()">Add Job</button>
<button id="adminBtn" onclick="goAdmin()">Admin</button>
<button id="myBtn" onclick="goMy()">My Apps</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- SEARCH -->
<div class="container-box">
<h3>Search Jobs</h3>

<input id="search" placeholder="Search job...">

<button onclick="searchJobs()">Search</button>
<button onclick="loadJobs()">Show All</button>

</div>

<!-- JOB LIST -->
<div id="jobs" class="row m-3"></div>

<!-- ADD JOB POPUP -->
<div id="jobForm">
<h3>Add Job</h3>

<input id="title" placeholder="Title"><br><br>
<input id="company" placeholder="Company"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="salary" placeholder="Salary"><br><br>

<button onclick="addJob()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

// PAGE LOAD
window.onload = function () {

let role = localStorage.getItem("role");

if (role === "ADMIN") {
document.getElementById("adminBtn").style.display = "inline";
document.getElementById("addJobBtn").style.display = "inline";
document.getElementById("myBtn").style.display = "none";
} else {
document.getElementById("adminBtn").style.display = "none";
document.getElementById("addJobBtn").style.display = "none";
document.getElementById("myBtn").style.display = "inline";
}

loadJobs();
};

// LOAD JOBS
function loadJobs() {
fetch("http://localhost:8080/jobs/all")
.then(res => res.json())
.then(showJobs);
}

// SEARCH FIXED
function searchJobs() {

const keyword = document.getElementById("search").value.trim();

if(keyword===""){
alert("Enter job name");
return;
}

fetch("http://localhost:8080/jobs/search/title?keyword=" + keyword)
.then(res => res.json())
.then(showJobs);
}

// SHOW JOBS
function showJobs(jobs) {

let jobsDiv = document.getElementById("jobs");
jobsDiv.innerHTML = "";

if (!jobs || jobs.length === 0) {
jobsDiv.innerHTML = "<h3 style='color:white'>No Jobs Found</h3>";
return;
}

jobs.forEach(job => {
jobsDiv.innerHTML += `
<div class="col-md-4">
<div class="card">
<h3>${job.title}</h3>
<p>${job.company}</p>
<p>${job.location}</p>
<b>${job.salary}</b>

<input type="file" id="file${job.id}">
<button class="apply-btn" onclick="applyJob(${job.id})">Apply</button>
</div>
</div>
`;
});
}

// APPLY JOB FIXED
function applyJob(jobId) {

let fileInput = document.getElementById("file" + jobId);

if (!fileInput.files[0]) {
alert("Upload resume");
return;
}

let formData = new FormData();
formData.append("file", fileInput.files[0]);
formData.append("jobId", jobId);
formData.append("email", localStorage.getItem("email"));

fetch("http://localhost:8080/applications/applyWithFile", {
method: "POST",
body: formData
})
.then(res => res.json())
.then(() => {
alert("Applied Successfully ✅");
});
}

// ADD JOB FIXED
function addJob(){

fetch("http://localhost:8080/jobs/add",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
title:document.getElementById("title").value,
company:document.getElementById("company").value,
location:document.getElementById("location").value,
salary:document.getElementById("salary").value
})
})
.then(()=>{
alert("Job Added ✅");
closeForm();
loadJobs();
});
}

// UI
function openAddJob(){ document.getElementById("jobForm").style.display="block"; }
function closeForm(){ document.getElementById("jobForm").style.display="none"; }

// NAV
function goMy(){ window.location="my-applications.html"; }
function goAdmin(){ window.location="admin-applications.html"; }
function logout(){ localStorage.clear(); window.location="login.html"; }

</script>

</body>
</html>
