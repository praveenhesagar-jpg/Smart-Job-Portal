<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<meta charset="UTF-8">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(120deg,#38bdf8,#7c3aed);
font-family:Arial;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#6366f1;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Register</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
</div>

<script>
function register(){
fetch("/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
})
.then(()=>alert("Registered Successfully"));
}
</script>

</body>
</html>
